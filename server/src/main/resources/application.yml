spring:
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      printer:
        enabled: true
  data:
    rest:
      base-path: /api
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        schema_create_index_if_not_exists: true
  datasource:
    url: jdbc:postgresql://localhost:5432/fitbit_db
    username: admin
    password: admin_password
    driver-class-name: org.postgresql.Driver

server:
  port: 8080