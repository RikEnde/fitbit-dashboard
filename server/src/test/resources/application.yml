spring:
  graphql:
    graphiql:
      enabled: true
    path: /graphql
    schema:
      printer:
        enabled: true
  data:
    rest:
      base-path: /api
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:testdb;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false

server:
  port: 8080

fitbit:
  security:
    username: testuser
    password: testpass
